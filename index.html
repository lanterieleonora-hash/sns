<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raffaele Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🗣️ Raffaele Tracker</h1>
        
        <div class="counter-box">
            <h2>"aura" </h2>
            <p class="count" id="aura-count">0</p>
            <button onclick="increment('aura')">+1 Aura</button>
        </div>

        <div class="counter-box">
            <h2>"and that's it" 🛑</h2>
            <p class="count" id="thatsit-count">0</p>
            <button onclick="increment('thatsIt')">+1 And that's it</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
